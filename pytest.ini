[pytest]
# ---------------------------------------------------------------------------
# pytest + playwright configuration
# ---------------------------------------------------------------------------
addopts =
    --browser chromium
    --screenshot only-on-failure
    --video retain-on-failure
    --tracing retain-on-failure
    -v

# Slow network / CI tolerance – give Angular time to bootstrap
timeout = 30

# Test discovery
testpaths = tests

# Markers
markers =
    smoke: fast sanity check subset
    regression: full regression suite
